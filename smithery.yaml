# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - resendApiKey
    properties:
      resendApiKey:
        type: string
        description: Your Resend API key
      senderEmailAddress:
        type: string
        description: Sender email address (optional)
      replyToEmailAddresses:
        type: array
        items:
          type: string
        description: Reply-to email addresses (optional)
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => {
      const args = [
        'build/index.js',
        `--key=${config.resendApiKey}`
      ];
      if (config.senderEmailAddress) {
        args.push(`--sender=${config.senderEmailAddress}`);
      }
      if (Array.isArray(config.replyToEmailAddresses)) {
        for (const addr of config.replyToEmailAddresses) {
          args.push(`--reply-to=${addr}`);
        }
      }
      return {
        command: 'node',
        args,
      };
    }
  exampleConfig:
    resendApiKey: re_123456abcdef
    senderEmailAddress: sender@example.com
    replyToEmailAddresses:
      - reply1@example.com
      - reply2@example.com
